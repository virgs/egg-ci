version: 2.1

jobs:
  install:
    docker:
      - image: cimg/node:22.12
    steps:
      - checkout
      - restore_cache:
          keys:
            - node-deps-v1-{{ checksum "package-lock.json" }}
      - run:
          name: Install dependencies
          command: npm ci
      - save_cache:
          key: node-deps-v1-{{ checksum "package-lock.json" }}
          paths:
            - node_modules
      - persist_to_workspace:
          root: .
          paths:
            - node_modules

  lint:
    docker:
      - image: cimg/node:22.12
    steps:
      - checkout
      - attach_workspace:
          at: .
      - run:
          name: Lint
          command: npm run lint

  test:
    docker:
      - image: cimg/node:22.12
    steps:
      - checkout
      - attach_workspace:
          at: .
      - run:
          name: Test
          command: npx vitest run --reporter=junit --outputFile=./test-results/junit.xml
      - store_test_results:
          path: ./test-results

  coverage:
    docker:
      - image: cimg/node:22.12
    steps:
      - checkout
      - attach_workspace:
          at: .
      - run:
          name: Coverage
          command: npm run coverage
      - store_artifacts:
          path: coverage
          destination: coverage

  build:
    docker:
      - image: cimg/node:22.12
    steps:
      - checkout
      - attach_workspace:
          at: .
      - run:
          name: Build
          command: npm run build
      - store_artifacts:
          path: docs
          destination: build
      - persist_to_workspace:
          root: .
          paths:
            - docs

  publish:
    docker:
      - image: cimg/node:22.12
    steps:
      - checkout
      - attach_workspace:
          at: .
      - run:
          name: Publish docs to main/docs
          command: |
            if [ -z "$GITHUB_TOKEN" ]; then
              echo "GITHUB_TOKEN is not set"
              exit 1
            fi

            git config user.name "${GIT_USER_NAME:-egg-ci-bot}"
            git config user.email "${GIT_USER_EMAIL:-egg-ci-bot@users.noreply.github.com}"

            REPO_URL="https://${GITHUB_TOKEN}@github.com/${CIRCLE_PROJECT_USERNAME}/${CIRCLE_PROJECT_REPONAME}.git"

            git add docs

            if git diff --cached --quiet; then
              echo "No docs changes to publish"
              exit 0
            fi

            git commit -m "Publish docs for ${CIRCLE_SHA1} [skip ci]"
            git push "$REPO_URL" HEAD:main

workflows:
  ci:
    jobs:
      - install
      - lint:
          requires:
            - install
      - test:
          requires:
            - install
      - coverage:
          requires:
            - install
      - build:
          requires:
            - lint
            - test
      - publish:
          requires:
            - build
          filters:
            branches:
              only:
                - main
